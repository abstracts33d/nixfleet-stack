{
  "platform": "linux",
  "queries": {
    "file_events_etc": {
      "query": "SELECT target_path, category, action, time FROM file_events WHERE category IN ('etc','log');",
      "interval": 3600,
      "removed": false
    }
  },
  "file_paths": {
    "etc": [ "/etc/%%" ],
    "log": [ "/var/log/%%", "/nix/var/log/%%" ]
  }
}
