{
  "platform": "linux,darwin",
  "queries": {
    "processes_root": {
      "query": "SELECT pid, name, path, uid, cmdline FROM processes WHERE uid < 1000;",
      "interval": 900
    },
    "processes_users_redacted": {
      "query": "SELECT pid, name, path, uid, '<redacted>' AS cmdline FROM processes WHERE uid >= 1000;",
      "interval": 900
    },
    "listening_ports": {
      "query": "SELECT pid, port, protocol, family, address FROM listening_ports;",
      "interval": 900
    },
    "open_sockets_tcp": {
      "query": "SELECT pid, local_address, local_port, remote_address, remote_port, state FROM process_open_sockets WHERE family IN (2,10) AND protocol = 6;",
      "interval": 900
    },
    "logged_in_users": {
      "query": "SELECT user, host, time, type FROM logged_in_users;",
      "interval": 900
    },
    "last_failures_linux": {
      "query": "SELECT username, type, time, host FROM last WHERE type IN (7, 8);",
      "interval": 900,
      "platform": "linux"
    },
    "usb_devices_linux": {
      "query": "SELECT vendor_id, model_id, vendor, model, serial FROM usb_devices;",
      "interval": 900,
      "platform": "linux"
    },
    "interface_addresses": {
      "query": "SELECT interface, address, mask, type FROM interface_addresses;",
      "interval": 900
    },
    "routes_linux": {
      "query": "SELECT destination, gateway, interface, metric FROM routes;",
      "interval": 900,
      "platform": "linux"
    },
    "arp_cache_linux": {
      "query": "SELECT address, mac, interface FROM arp_cache;",
      "interval": 900,
      "platform": "linux"
    }
  }
}
